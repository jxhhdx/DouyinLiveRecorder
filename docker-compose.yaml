version: '3.8'

services:
  # 直播录制服务
  recorder:
    build: .
    image: douyin-live-recorder:latest
    container_name: live-recorder
    environment:
      - TERM=xterm-256color
      - TZ=Asia/Shanghai
    tty: true
    stdin_open: true
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
      - ./backup_config:/app/backup_config
      - ./downloads:/app/downloads
      - ./aliyunpan:/root/aliyunpan  # 阿里云盘登录凭证持久化
    restart: always
    networks:
      - live-network

  # 自动上传服务
  uploader:
    build: .
    image: douyin-live-recorder:latest
    container_name: live-uploader
    environment:
      - TZ=Asia/Shanghai
      # 阿里云盘配置
      - ALIYUNPAN_BIN=/usr/local/bin/aliyunpan
      - ALIYUNPAN_REMOTE_PATH=/直播录制
      # 路径配置
      - RECORD_DIR=/app/downloads
      - LOG_DIR=/app/logs
      # 上传配置
      - DELETE_AFTER_UPLOAD=true
      - UPLOAD_INTERVAL=30
      - MIN_FILE_SIZE=10485760  # 10MB
      # 邮件通知配置（可选）
      - MAIL_ENABLED=false
      - SMTP_SERVER=smtp.qq.com
      - SMTP_PORT=465
      - SMTP_USE_SSL=true
      - SENDER_EMAIL=
      - SENDER_PASSWORD=
      - RECEIVER_EMAIL=
      - MAIL_MIN_INTERVAL=60
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
      - ./downloads:/app/downloads
      - ./aliyunpan:/root/aliyunpan  # 共享阿里云盘登录凭证
    command: ["python", "auto_uploader.py"]
    restart: always
    depends_on:
      - recorder
    networks:
      - live-network

networks:
  live-network:
    driver: bridge
